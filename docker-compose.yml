services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: your5e
      POSTGRES_USER: your5e
      POSTGRES_PASSWORD: your5e
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U your5e"]
      interval: 2s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
