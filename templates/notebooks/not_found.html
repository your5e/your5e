{% extends "base.html" %}

{% block title %}Page not found - {{ notebook.name }} - Your 5E{% endblock %}

{% block content %}
<article>
<h1>Page not found</h1>
<p>The page <strong>{{ path }}</strong> does not exist in {{ notebook.name }}.</p>

{% if suggested_filename %}
<h2>Create this page</h2>
<form method="post"{% if form_action %} action="{{ form_action }}"{% endif %}>
{% csrf_token %}
<p>
<label for="filename">Filename</label><br>
<input type="text" id="filename" name="filename" value="{{ suggested_filename }}">
</p>
<p>
<label for="content">Content</label><br>
<textarea id="content" name="content" rows="20" cols="80"></textarea>
</p>
<p>
<input type="submit" value="Create">
</p>
</form>
{% endif %}

</article>
{% endblock %}
