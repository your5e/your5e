services:
  db:
    command:
      - "postgres"
      - "-c"
      - "fsync=off"
      - "-c"
      - "full_page_writes=off"
      - "-c"
      - "log_checkpoints=off"
      - "-c"
      - "synchronous_commit=off"

  web:
    ports:
      - "5843:8000"
    volumes:
      - .:/app
    environment:
      DEBUG: "1"
      PYTHONUNBUFFERED: "1"
      SECRET_KEY: "dev"
      DB_NAME: "your5e"
      DB_USER: "your5e"
      DB_PASSWORD: "your5e"
      DB_HOST: "db"
      DB_PORT: "5432"
